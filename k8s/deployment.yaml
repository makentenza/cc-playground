apiVersion: apps/v1
kind: Deployment
metadata:
  name: cc-playground
  namespace: cc-playground
  labels: { app: cc-playground }
spec:
  replicas: 1
  selector:
    matchLabels: { app: cc-playground }
  template:
    metadata:
      labels: { app: cc-playground }
      annotations:
        # Paste the initdata your Trustee admin shared (Confidential Attestation →
        # TrusteeConfig → Initdata → Share). It points the in-guest CDH at the KBS
        # and is measured into the TEE evidence. Without it the workload cannot
        # attest and the CDH cannot fetch secrets.
        io.katacontainers.config.hypervisor.cc_init_data: "<PASTE_INITDATA_FROM_TRUSTEE>"
    spec:
      # Confidential runtime. Must match a RuntimeClass installed by the
      # OpenShift sandboxed containers / CoCo operator on a TEE node.
      runtimeClassName: kata-cc
      containers:
        - name: cc-playground
          # Built and pushed by GitHub Actions (.github/workflows/build.yml).
          # For an in-cluster build instead, run ./build.sh and set this to
          # image-registry.openshift-image-registry.svc:5000/cc-playground/cc-playground:latest
          image: quay.io/makentenza/cc-playground:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            # Downward API — what the workload can prove about itself.
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
            - name: POD_NAMESPACE
              valueFrom: { fieldRef: { fieldPath: metadata.namespace } }
            - name: POD_UID
              valueFrom: { fieldRef: { fieldPath: metadata.uid } }
            - name: POD_IP
              valueFrom: { fieldRef: { fieldPath: status.podIP } }
            - name: NODE_NAME
              valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
            - name: SERVICE_ACCOUNT
              valueFrom: { fieldRef: { fieldPath: spec.serviceAccountName } }
            # Static context (no downward API for these).
            - name: RUNTIME_CLASS
              value: kata-cc
            - name: WORKLOAD_IMAGE
              value: cc-playground
            # Manual fallback only — the real KBS URL is decoded from the
            # initdata (CC_INIT_DATA below) at container start.
            - name: KBS_URL
              value: ""
            # The initdata (gzip+base64) the guest attests with — the source of
            # truth for WHICH Trustee/KBS this workload uses. Exposed via the
            # downward API so the entrypoint can decode the real KBS endpoint and
            # show whether it's a co-located or a remote (hub-and-spoke) Trustee.
            - name: CC_INIT_DATA
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['io.katacontainers.config.hypervisor.cc_init_data']
            # The headline KBS resource (drives the attestation verdict).
            # Always <repository>/<name>/<key> (three segments).
            - name: CDH_RESOURCE_PATH
              value: default/kbsres1/key1
            # Every KBS resource to fetch + list (comma-separated). The guest can't
            # enumerate KBS resources, so list the ones you want shown here — each
            # is released only because this workload is hardware-attested.
            - name: CDH_RESOURCE_PATHS
              value: default/kbsres1/key1,default/makpassword/mak
          resources:
            # IMPORTANT: a confidential (Intel TDX / AMD SEV-SNP) guest can't
            # hotplug memory, so kata sizes the WHOLE guest VM from this memory
            # limit. Too small (e.g. 256Mi) starves the guest kernel + kata-agent
            # and the VM never boots ("Cannot start VM ... timed out connecting to
            # vsock"). Give the guest real room — 1Gi+.
            requests: { cpu: 100m, memory: 512Mi }
            limits: { cpu: 500m, memory: 1Gi }
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities: { drop: ["ALL"] }
            seccompProfile: { type: RuntimeDefault }
