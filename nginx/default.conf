# cc-playground nginx server. Listens on 8080 (unprivileged, OpenShift-friendly).
server {
    listen       8080;
    listen       [::]:8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Workload/node/TEE facts, written at container start by 40-cc-info.sh.
    location = /info.json {
        default_type application/json;
        alias /tmp/cc-info.json;
        add_header Cache-Control "no-store";
    }

    # Reverse-proxy to the in-guest Confidential Data Hub (CDH). This is the
    # whole trick: the browser cannot reach the guest's 127.0.0.1:8006, but
    # nginx runs *inside* the TEE guest, so it can — and serves it same-origin.
    # The CDH only returns a resource after the KBS has verified the TEE
    # evidence, so a 200 here is proof this workload attested.
    location /cdh/ {
        proxy_pass http://127.0.0.1:8006/cdh/;
        proxy_read_timeout 20s;
        proxy_connect_timeout 5s;
        # Let real CDH status codes (404 missing, 401/403 denied) reach the UI.
        proxy_intercept_errors off;
        add_header Cache-Control "no-store";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
