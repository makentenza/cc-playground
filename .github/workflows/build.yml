name: build-and-push

# Build the cc-playground image on every push to main and publish it to Quay.
# Override the destination by setting a repo variable QUAY_IMAGE; otherwise the
# default below is used. Requires repo secrets QUAY_USERNAME and QUAY_PASSWORD
# (a Quay robot account is recommended).
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ${{ vars.QUAY_IMAGE || 'quay.io/makentenza/cc-playground' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Quay
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # buildx defaults (provenance/SBOM attestations + OCI media types) break
          # kata-cc's in-guest image pull (image-rs): the attestations wrap the
          # image in a manifest list it can't resolve, and it hangs on OCI-
          # mediatype layers. So: no attestations, and force Docker schema2 media
          # types (oci-mediatypes=false) — which also pushes the image.
          provenance: false
          sbom: false
          outputs: type=image,oci-mediatypes=false,push=true
